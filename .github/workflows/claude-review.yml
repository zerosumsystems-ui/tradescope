name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  # Required so anthropics/claude-code-action@v1 can fetch an OIDC token
  # for posting inline review comments. Without this the action exits with
  # "Could not fetch an OIDC token" during setup.
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip draft PRs and the auto-merge claude/** branches to avoid reviewing Claude's own output
    if: |
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
       !startsWith(github.event.pull_request.head.ref, 'claude/'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 5"
          prompt: |
            Review this pull request. This is a Next.js 16 + React 19 + Supabase
            project. IMPORTANT: read AGENTS.md and CLAUDE.md at the repo root
            first — AGENTS.md documents Next.js 16 breaking changes you must
            respect before flagging issues.

            Focus on:
            - Correctness and potential bugs (nulls, races, off-by-one)
            - Security (XSS, SSRF, secret leaks, Supabase RLS assumptions)
            - Next.js 16 compatibility — flag any Next.js 15 patterns
            - Performance regressions in the scanner or pattern pipelines
            - Type safety (avoid `any`, narrow unknowns)

            Skip nitpicks: formatting, import order, trivial naming.
            Post findings as inline review comments on specific lines.
            If Ultra Review is available on this account, verify each finding
            before posting.
